services:
  db:
    image: postgres:16-alpine
    container_name: ajaai-db
    environment:
      POSTGRES_USER: ajaai
      POSTGRES_PASSWORD: ajaai
      POSTGRES_DB: ajaai
    volumes:
      - ajaai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ajaai -d ajaai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ajaai-redis
    volumes:
      - ajaai-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  ajaai:
    build:
      context: .
      args:
        DATABASE_PROVIDER: postgres
    container_name: ajaai
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://ajaai:ajaai@db:5432/ajaai?schema=public
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required. Generate one with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN:-}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  ajaai-postgres-data:
  ajaai-redis-data:
