services:
  ajaai:
    build: .
    container_name: ajaai
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=file:./prisma/prod.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
    volumes:
      - ajaai-data:/app/apps/api/prisma
    restart: unless-stopped

volumes:
  ajaai-data:
